version: '3.9'

services:

  postgres:
    image: postgres:15
    container_name: library_postgres

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: librarydb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    container_name: library_app

    ports:
      - "3000:3000"

    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/librarydb
      PORT: 3000
      API_KEY: nahda123

    depends_on:
      - postgres

    volumes:
      - .:/app
      - /app/node_modules

volumes:
  postgres_data: